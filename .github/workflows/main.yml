name: PCLink CI & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Trigger upstream compilation of FerrumCast Rust binaries required for bundling.
  build-ferrumcast:
    name: Build FerrumCast Binaries
    uses: BYTEDz/FerrumCast/.github/workflows/build.yml@main
    permissions:
      contents: write

  # Build Windows distributions in parallel to produce separate, faster-to-download artifacts.
  build-windows:
    needs: build-ferrumcast
    name: Build Windows (${{ matrix.format }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        format: [portable, onefile, installer]
    steps:
      - name: Check out PCLink
        uses: actions/checkout@v6

      - name: Download FerrumCast Windows binaries
        uses: actions/download-artifact@v7
        with:
          name: ferrumcast-x86_64-pc-windows-msvc
          path: temp-ferrumcast

      - name: Prepare FerrumCast binaries for packaging
        shell: powershell
        run: |
          $binDir = "src\pclink\assets\bin"
          if (!(Test-Path $binDir)) { New-Item -ItemType Directory -Force -Path $binDir }
          # Copy compiled binaries and required GStreamer DLL dependencies to the packaging directory.
          Copy-Item -Path "temp-ferrumcast\*" -Destination $binDir -Force
          Write-Host "Binaries injected for PyInstaller: $binDir"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install PCLink Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Inno Setup
        # Only install Inno Setup when building the installer to save time
        if: matrix.format == 'installer'
        run: choco install innosetup -y --no-progress

      - name: Build ${{ matrix.format }} Package
        run: python scripts/build.py --format ${{ matrix.format }} --clean

      - name: Upload Windows Artifact (${{ matrix.format }})
        uses: actions/upload-artifact@v7
        with:
          # This dynamically names the artifact (e.g. PCLink-Windows-installer)
          name: PCLink-Windows-${{ matrix.format }}
          path: releases/
          compression-level: 0

  # Package Linux distributions for target architectures (amd64, arm64) using NFPM.
  build-linux:
    needs: build-ferrumcast
    name: Build Linux Packages (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    steps:
      - name: Check out PCLink
        uses: actions/checkout@v6

      - name: Download FerrumCast Linux binaries
        uses: actions/download-artifact@v7
        with:
          name: ferrumcast-${{ matrix.arch == 'arm64' && 'aarch64-unknown-linux-gnu' || 'x86_64-unknown-linux-gnu' }}
          path: temp-ferrumcast
        continue-on-error: true

      - name: Prepare FerrumCast binaries
        run: |
          mkdir -p src/pclink/assets/bin
          if [ -d "temp-ferrumcast" ]; then
            # Standardize executable names by removing platform-specific suffixes.
            cp temp-ferrumcast/ferrumcast-linux src/pclink/assets/bin/ferrumcast || cp temp-ferrumcast/ferrumcast src/pclink/assets/bin/ferrumcast
            chmod +x src/pclink/assets/bin/ferrumcast
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Packaging Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential dpkg-dev rpm python3-pip wget
          python3 -m pip install --upgrade pip
          pip install wheel setuptools build pyyaml

      - name: Install NFPM
        run: |
          NFPM_VERSION="2.40.0"
          NFPM_ARCH=${{ matrix.arch == 'arm64' && 'arm64' || 'amd64' }}
          wget "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_${NFPM_ARCH}.deb"
          sudo dpkg -i nfpm_${NFPM_VERSION}_${NFPM_ARCH}.deb

      - name: Build Packages (${{ matrix.arch }})
        run: python3 scripts/build.py --format nfpm --arch ${{ matrix.arch }}

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: PCLink-Linux-${{ matrix.arch }}
          path: releases/
          compression-level: 0

  # Consolidate builds and publish the release onto GitHub.
  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Check out PCLink
        uses: actions/checkout@v6

      - name: Download PCLink build artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: PCLink-* # <-- Fix 1: Only download PCLink artifacts, ignore upstream FerrumCast ones
          path: artifacts/

      - name: Clean up unused artifacts (Safety Measure)
        run: |
          # <-- Fix 2: Ensures FerrumCast raw artifacts are completely wiped if they bypassed the pattern filter
          rm -rf artifacts/ferrumcast-*

      - name: Generate Checksum File
        run: |
          cd artifacts
          find . -type f -exec sha256sum {} + | sort > ../SHA256SUMS.txt

      - name: Extract Release Notes from CHANGELOG
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          # Parse and extract release notes for the current version block from CHANGELOG.md.
          NOTES=$(awk -v ver="$VERSION" 'BEGIN{p=0} /^## \['"$VERSION"'\]/{p=1;next} /^## \[/{p=0} p' CHANGELOG.md)
          if [ -z "$NOTES" ]; then NOTES="See CHANGELOG.md for details."; fi
          echo "$NOTES" > RELEASE_NOTES.md
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Generate Dynamic PKGBUILD
        run: |
          python scripts/generate_pkgbuild.py --output artifacts/PKGBUILD || touch artifacts/PKGBUILD

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Append pre-release flag if the tag format includes alpha, beta, rc, or semver suffixes.
          PRERELEASE_FLAG=""
          if [[ "$TAG" =~ [0-9]+\.[0-9]+\.[0-9]+-.* ]] || [[ "$TAG" =~ (beta|alpha|rc) ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Create the GitHub Release with flattened build artifacts, dynamic PKGBUILD, and checksum manifest.
          # If the release already exists (e.g. created by scripts/release.py), update notes and upload assets instead.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Updating notes and uploading assets..."
            gh release edit "$TAG" --notes-file RELEASE_NOTES.md
            gh release upload "$TAG" ./artifacts/*/* ./artifacts/PKGBUILD SHA256SUMS.txt
          else
            echo "Creating new release $TAG..."
            gh release create "$TAG" ./artifacts/*/* ./artifacts/PKGBUILD SHA256SUMS.txt \
              --title "Release $TAG" \
              --notes-file RELEASE_NOTES.md \
              $PRERELEASE_FLAG
          fi
