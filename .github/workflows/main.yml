name: PCLink CI & Release
# Updated to use NFPM instead of FPM for Linux package building

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows Packages
    runs-on: windows-2022
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build Portable Archive
        run: python scripts/build.py --format portable --clean

      - name: Build One-File Executable
        run: python scripts/build.py --format onefile

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows Installer
        run: python scripts/build.py --format installer

      - name: Verify Windows build outputs
        run: |
          echo "Build artifacts:"
          if (Test-Path "releases") {
            Get-ChildItem releases\ -Recurse | Format-Table Name, Length
            
            # Check if web UI files are included in the build
            $exeFile = Get-ChildItem releases\ -Recurse -Filter "*.exe" | Select-Object -First 1
            if ($exeFile) {
              echo "Found executable: $($exeFile.FullName)"
              # For PyInstaller builds, web UI files should be embedded
              echo "Web UI files should be embedded in the executable"
            }
          } else {
            echo "No releases directory found"
          }
        shell: powershell

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PCLink-Windows
          path: releases/
          compression-level: 0

  build-wheel:
    name: Build Python Wheel
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Build Python wheel
        run: python -m build --wheel

      - name: Verify wheel contents
        run: |
          echo "Built wheel:"
          ls -lh dist/*.whl
          echo "Wheel contents:"
          unzip -l dist/*.whl | head -30

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCLink-Wheel
          path: dist/*.whl
          compression-level: 0

  build-linux:
    name: Build Linux Packages (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Packaging Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential dpkg-dev rpm python3-pip python3-venv wget
          python3 -m pip install --upgrade pip
          pip install wheel setuptools build pyyaml

      - name: Install NFPM
        run: |
          NFPM_VERSION="2.40.0"
          # Determine correct NFPM binary based on matrix arch
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            NFPM_ARCH="arm64"
          else
            NFPM_ARCH="amd64"
          fi
          wget "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_${NFPM_ARCH}.deb"
          sudo dpkg -i nfpm_${NFPM_VERSION}_${NFPM_ARCH}.deb
          rm nfpm_${NFPM_VERSION}_${NFPM_ARCH}.deb

      - name: Build Package (${{ matrix.arch }})
        run: python3 scripts/build.py --format nfpm --arch ${{ matrix.arch }}

      - name: Verify build outputs
        run: |
          echo "Build artifacts for ${{ matrix.arch }}:"
          if [ -d "releases" ]; then
            ls -la releases/
            find releases/ -name "*.deb" -o -name "*.rpm" -o -name "*.pkg.tar.zst"
          else
            echo "No releases directory found"
            exit 1
          fi

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PCLink-Linux-${{ matrix.arch }}
          path: releases/
          compression-level: 0

  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux, build-wheel]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') # ONLY publish when a version tag is pushed
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate Checksum File
        run: |
          cd artifacts
          find . -type f -exec sha256sum {} + | sort > ../SHA256SUMS.txt
          echo "Generated SHA256SUMS.txt:"
          cat ../SHA256SUMS.txt

      - name: Extract Release Notes from CHANGELOG
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # For manual triggers, get the latest version from CHANGELOG
            VERSION=$(grep -m1 "^## \[" CHANGELOG.md | sed 's/^## \[\(.*\)\].*/\1/')
            TAG="v$VERSION"
          else
            # For tag triggers, use the tag
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          fi

          echo "Using TAG: $TAG, VERSION: $VERSION"

          NOTES=$(awk -v ver="$VERSION" 'BEGIN{p=0} /^## \['"$VERSION"'\]/{p=1;next} /^## \[/{p=0} p' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          echo "$NOTES" > RELEASE_NOTES.md
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Generate Dynamic PKGBUILD
        run: |
          python scripts/generate_pkgbuild.py --output artifacts/PKGBUILD

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Detect if this is a pre-release (contains beta, alpha, rc, or a hyphen)
          PRERELEASE_FLAG=""
          if [[ "$TAG" =~ [0-9]+\.[0-9]+\.[0-9]+-.* ]] || [[ "$TAG" =~ (beta|alpha|rc) ]]; then
            echo "Detected Pre-release version"
            PRERELEASE_FLAG="--prerelease"
          fi

          # Delete existing release if it exists (for re-uploads)
          gh release delete "$TAG" --yes || true

          # Create new release with correct flags
          gh release create "$TAG" ./artifacts/*/* ./artifacts/PKGBUILD SHA256SUMS.txt \
            --title "Release $TAG" \
            --notes-file RELEASE_NOTES.md \
            $PRERELEASE_FLAG

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheel]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') # Only publish stable versions (v1.0.0, not v1.0.0-beta.1)
    permissions:
      id-token: write # Required for Trusted Publishing
    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: PCLink-Wheel
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
