name: PCLink CI & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 1. Build FerrumCast binaries first (reusable workflow from FerrumCast repo)
  build-ferrumcast:
    name: Build FerrumCast Binaries
    uses: BYTEDz/FerrumCast/.github/workflows/build.yml@main
    permissions:
      contents: write

  # 2. Build Windows Packages
  build-windows:
    needs: build-ferrumcast
    name: Build Windows Packages
    runs-on: windows-2022
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download FerrumCast Windows binaries
        uses: actions/download-artifact@v4
        with:
          name: ferrumcast-x86_64-pc-windows-msvc
          path: temp-ferrumcast

      - name: Prepare FerrumCast binaries for packaging
        shell: powershell
        run: |
          $binDir = "src\pclink\assets\bin\windows"
          if (!(Test-Path $binDir)) { New-Item -ItemType Directory -Force -Path $binDir }
          # Copy everything (exe + GStreamer DLLs) from FerrumCast build
          Copy-Item -Path "temp-ferrumcast\*" -Destination $binDir -Force
          Write-Host "FerrumCast binaries prepared in $binDir"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build Portable Archive
        run: python scripts/build.py --format portable --clean

      - name: Build One-File Executable
        run: python scripts/build.py --format onefile

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows Installer
        run: python scripts/build.py --format installer

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PCLink-Windows
          path: releases/
          compression-level: 0

  # 3. Build Python Wheel
  build-wheel:
    name: Build Python Wheel
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Build Python wheel
        run: python -m build --wheel

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCLink-Wheel
          path: dist/*.whl
          compression-level: 0

  # 4. Build Linux Packages (Multi-Arch)
  build-linux:
    needs: build-ferrumcast
    name: Build Linux Packages (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download FerrumCast Linux binaries
        uses: actions/download-artifact@v4
        with:
          name: ferrumcast-x86_64-unknown-linux-gnu
          path: temp-ferrumcast
        continue-on-error: true

      - name: Prepare FerrumCast binaries
        run: |
          mkdir -p src/pclink/assets/bin/linux
          if [ -d "temp-ferrumcast" ]; then
            if [ -f "temp-ferrumcast/ferrumcast-linux" ]; then
              cp temp-ferrumcast/ferrumcast-linux src/pclink/assets/bin/linux/ferrumcast
            elif [ -f "temp-ferrumcast/ferrumcast" ]; then
              cp temp-ferrumcast/ferrumcast src/pclink/assets/bin/linux/ferrumcast
            fi
            chmod +x src/pclink/assets/bin/linux/ferrumcast
            echo "FerrumCast binary ready."
          else
            echo "WARNING: FerrumCast binaries not found for this arch."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Packaging Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential dpkg-dev rpm python3-pip wget
          python3 -m pip install --upgrade pip
          pip install wheel setuptools build pyyaml

      - name: Install NFPM
        run: |
          NFPM_VERSION="2.40.0"
          NFPM_ARCH=${{ matrix.arch == 'arm64' && 'arm64' || 'amd64' }}
          wget "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_${NFPM_ARCH}.deb"
          sudo dpkg -i nfpm_${NFPM_VERSION}_${NFPM_ARCH}.deb

      - name: Build Package (${{ matrix.arch }})
        run: python3 scripts/build.py --format nfpm --arch ${{ matrix.arch }}

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PCLink-Linux-${{ matrix.arch }}
          path: releases/
          compression-level: 0

  # 5. Publish GitHub Release with Notes and Checksums
  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux, build-wheel]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate Checksum File
        run: |
          cd artifacts
          find . -type f -exec sha256sum {} + | sort > ../SHA256SUMS.txt
          cd ..

      - name: Extract Release Notes from CHANGELOG
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          NOTES=$(awk -v ver="$VERSION" 'BEGIN{p=0} /^## \['"$VERSION"'\]/{p=1;next} /^## \[/{p=0} p' CHANGELOG.md)
          if [ -z "$NOTES" ]; then NOTES="See CHANGELOG.md for details."; fi
          echo "$NOTES" > RELEASE_NOTES.md
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Generate Dynamic PKGBUILD
        run: |
          # Use your original script to generate PKGBUILD
          python scripts/generate_pkgbuild.py --output artifacts/PKGBUILD || touch artifacts/PKGBUILD

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$TAG" =~ [0-9]+\.[0-9]+\.[0-9]+-.* ]] || [[ "$TAG" =~ (beta|alpha|rc) ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" ./artifacts/*/* ./artifacts/PKGBUILD SHA256SUMS.txt \
            --title "Release $TAG" \
            --notes-file RELEASE_NOTES.md \
            $PRERELEASE_FLAG

  # 6. Publish to PyPI
  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheel]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    permissions:
      id-token: write
    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: PCLink-Wheel
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
