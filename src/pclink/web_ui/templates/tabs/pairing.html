<!-- Pairing -->
<div class="tab-content" id="pairing">
  <div class="card bg-base-100 shadow-sm border border-base-300 w-full">
    <div class="card-body items-center text-center font-bold">
      <h3 class="text-2xl font-black"><i data-feather="smartphone" class="inline-block mr-2 text-primary"></i> Pair New Device</h3>
      <p class="opacity-70 font-normal mb-6 text-sm">Scan this QR code with the PCLink app to link your device.</p>
      <div class="flex flex-wrap gap-3 justify-center mb-6">
        <button class="btn btn-primary text-white" onclick="generateQRCode()"><i data-feather="square"></i> Generate QR Code</button>
        <button class="btn btn-ghost border-base-300" onclick="regenerateQRCode()"><i data-feather="refresh-cw"></i> Regenerate</button>
      </div>
      <div id="qrCodeDisplay" class="mb-8"></div>
      <div class="bg-base-200 p-6 rounded-xl text-left w-full border border-base-300 font-normal">
        <h4 class="font-bold mb-4 uppercase text-xs opacity-50 tracking-widest">Setup Guide</h4>
        <ol class="list-decimal pl-5 space-y-2 opacity-80 text-sm">
          <li>Install the PCLink companion app from your app store.</li>
          <li>Press the button above to generate a secure code.</li>
          <li>Scan the code and approve the request here.</li>
        </ol>
      </div>
    </div>
  </div>
</div>
