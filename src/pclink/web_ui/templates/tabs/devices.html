<!-- Devices -->
<div class="tab-content" id="devices">
  <div class="flex justify-between items-center gap-3 mb-4 w-full">
    <div class="flex items-center gap-2">
      <span class="badge badge-primary font-bold" id="deviceCount">0</span>
      <span class="text-[10px] uppercase font-black opacity-30 tracking-widest">Clients</span>
    </div>
    <div class="flex gap-2">
      <button class="btn btn-xs btn-primary text-white font-bold" onclick="window.openPairingPanel()"><i
          data-feather="plus" class="w-3"></i> Pair New</button>
      <button class="btn btn-xs btn-ghost border-base-300" onclick="refreshDevices()"><i data-feather="refresh-cw"
          class="w-3"></i></button>
      <button class="btn btn-xs btn-error btn-outline" onclick="removeAllDevices()"><i data-feather="trash-2"
          class="w-3"></i> Clear Fleet</button>
    </div>
  </div>
  <div id="deviceList" class="grid grid-cols-[repeat(auto-fill,minmax(300px,1fr))] gap-3 w-full"></div>
  <div class="divider my-8 font-bold text-xs uppercase opacity-30 tracking-widest text-primary w-full">Pending Requests
  </div>
  <div id="pendingRequests" class="grid grid-cols-1 gap-4 w-full"></div>
</div>
