<!-- Macros -->
<div class="tab-content" id="macros">
  <div class="w-full space-y-4">
    <div class="flex justify-between items-center mb-2">
      <div class="flex items-center gap-3">
        <span class="badge badge-primary font-bold" id="macroCount">0</span>
        <span class="text-[10px] font-black uppercase opacity-30 tracking-widest">Available Macros</span>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-xs btn-ghost border-base-300" onclick="window.loadMacros()"><i data-feather="refresh-cw"
            class="w-3"></i></button>
        <button class="btn btn-xs btn-primary text-white font-bold" onclick="window.openMacroEditor()"><i
            data-feather="plus" class="w-3"></i> New Macro</button>
      </div>
    </div>
    <div id="macroList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 w-full">
      <div class="text-center py-10 opacity-50 col-span-full"><span class="loading loading-spinner"></span></div>
    </div>
  </div>
</div>
