<!-- Phone Files -->
<div class="tab-content h-full" id="phone-files">
  <div class="card bg-base-100 shadow-sm border border-base-300 flex-1 flex flex-col overflow-hidden w-full">
    <div class="p-3 border-b border-base-300 flex flex-wrap justify-between gap-3 items-center">
      <div class="flex items-center gap-2">
        <i data-feather="folder" class="text-primary w-4 h-4"></i>
        <span id="phoneReadOnlyBadge" class="badge badge-warning hidden font-bold uppercase text-[9px]">Read-Only</span>
        <select id="phoneDeviceSelector" class="select select-bordered select-xs w-[160px]" onchange="handlePhoneDeviceChange(this.value)">
          <option value="">Select Device...</option>
        </select>
      </div>
      <div class="flex gap-2 items-center">
        <div class="join">
          <button class="btn btn-xs join-item" onclick="goBackPhoneFiles()" id="phoneBackBtn" disabled><i data-feather="arrow-left" class="w-3"></i></button>
          <button class="btn btn-xs join-item" onclick="goForwardPhoneFiles()" id="phoneForwardBtn" disabled><i data-feather="arrow-right" class="w-3"></i></button>
          <button class="btn btn-xs join-item" onclick="refreshPhoneFiles()"><i data-feather="refresh-cw" class="w-3"></i></button>
        </div>
        <button class="btn btn-xs btn-primary text-white font-bold" id="phoneUploadBtn" onclick="triggerUpload()"><i data-feather="upload" class="w-3"></i> Upload</button>
        <input type="file" id="phoneUploadInput" class="hidden" multiple onchange="handlePhoneUpload(this)">
      </div>
    </div>
    <div class="bg-base-200 p-3 flex flex-wrap gap-3 items-center border-b border-base-300">
      <div class="flex-1 relative min-w-[150px]">
        <i data-feather="search" class="w-4 h-4 absolute left-3 top-2.5 opacity-50"></i>
        <input type="text" id="phoneFileSearch" class="input input-sm input-bordered w-full pl-9" placeholder="Search..." oninput="handlePhoneSearch(this.value)">
      </div>
      <select id="phoneFileSort" class="select select-sm select-bordered" onchange="handlePhoneSort(this.value)">
        <option value="name_asc">Name A-Z</option>
        <option value="size_desc">Largest</option>
        <option value="date_desc">Newest</option>
      </select>
      <label class="label cursor-pointer gap-2"><span class="label-text text-xs font-bold uppercase opacity-50">Hidden</span><input type="checkbox" class="checkbox checkbox-sm checkbox-primary" id="showHiddenFiles" onchange="handleToggleHidden(this.checked)"></label>
    </div>
    <div class="flex-1 flex flex-col overflow-hidden">
      <div id="phoneBreadcrumb" class="bg-base-200 p-2 text-[10px] font-mono truncate border-b border-base-300 opacity-60">Path: /</div>
      <div id="uploadProgressContainer" class="p-2 space-y-2 border-b border-base-300 empty:hidden"></div>
      <div id="phoneFileList" class="flex-1 overflow-y-auto"></div>
    </div>
  </div>
</div>
