<div id="links-management" class="tab-content h-full gap-6">
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-2xl font-bold tracking-tight">Share Links</h2>
      <p class="text-sm opacity-50">Manage active download links created for your files.</p>
    </div>
    <button class="btn btn-primary btn-sm font-bold" onclick="refreshLinks()">
      <i data-feather="refresh-cw" class="w-4 animate-spin-hover"></i> Refresh
    </button>
  </div>

  <div class="card bg-base-100 shadow-xl overflow-hidden border border-base-300 flex-1 min-h-0">
    <div class="overflow-x-auto h-full scrollbar">
      <table class="table table-zebra w-full table-md">
        <thead class="bg-base-300 sticky top-0 z-10">
          <tr>
            <th class="w-1/3">File</th>
            <th class="w-1/6">Device</th>
            <th class="w-1/6">Created At</th>
            <th class="w-1/6">Time Remaining</th>
            <th class="w-1/6 text-right">Actions</th>
          </tr>
        </thead>
        <tbody id="linksTableBody">
          <!-- Links will be injected here -->
          <tr>
            <td colspan="5" class="text-center py-20 opacity-50">
              <div class="flex flex-col items-center gap-2">
                <div class="loading loading-spinner loading-md text-primary"></div>
                <p>Loading share links...</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
