<!-- Extensions -->
<div class="tab-content" id="extensions">
  <div class="w-full space-y-4">
    <div id="extGlobalDisabledAlert" class="alert alert-warning hidden">
      <i data-feather="alert-triangle" class="w-5 shrink-0"></i>
      <div>
        <h4 class="font-black text-sm">Extensions are globally disabled</h4>
        <p class="text-xs opacity-80">Enable them via <button class="underline font-black" onclick="document.querySelector('[data-tab=services]').click()">Access Control → Firewall</button> first.</p>
      </div>
    </div>
    <div id="extSafeModeAlert" class="alert alert-error hidden">
      <i data-feather="shield-off" class="w-5 shrink-0"></i>
      <div>
        <h4 class="font-black text-sm">Safe Mode Active</h4>
        <p class="text-xs opacity-80">Extensions were disabled after repeated startup crashes. Delete the crash lock file and restart to recover.</p>
      </div>
    </div>
    <div class="card bg-base-100 shadow-sm border border-base-300 w-full">
      <div class="card-body p-5">
        <h3 class="card-title text-xs font-bold uppercase opacity-50 tracking-widest mb-3"><i data-feather="package" class="w-4"></i> Install Extension</h3>
        <div id="extDropZone" class="border-2 border-dashed border-base-300 rounded-xl p-6 text-center transition-colors hover:border-primary cursor-pointer mb-3" onclick="document.getElementById('extFileInput').click()" ondragover="event.preventDefault(); this.classList.add('border-primary','bg-primary/5')" ondragleave="this.classList.remove('border-primary','bg-primary/5')" ondrop="window.handleExtDrop(event)">
          <i data-feather="upload-cloud" class="w-8 h-8 mx-auto mb-2 opacity-40"></i>
          <p class="text-xs font-bold opacity-60">Drop <span class="text-primary">.zip</span> bundle here or click to browse</p>
          <input type="file" id="extFileInput" class="hidden" accept=".zip" onchange="window.handleExtFileSelect(this)">
        </div>
        <div class="flex gap-2">
          <input type="url" id="extUrlInput" placeholder="https://example.com/extension.zip" class="input input-sm input-bordered flex-1 font-mono text-xs" />
          <button class="btn btn-sm btn-primary text-white font-bold" onclick="window.installExtFromUrl()">
            <i data-feather="link" class="w-3"></i> Install URL
          </button>
        </div>
        <div id="extInstallProgress" class="hidden mt-3">
          <div class="flex items-center gap-3 p-3 bg-base-200 rounded-lg border border-base-300">
            <span class="loading loading-spinner loading-sm text-primary"></span>
            <span class="text-xs font-bold" id="extInstallMsg">Installing...</span>
          </div>
        </div>
      </div>
    </div>
    <div class="flex justify-between items-center">
      <span class="text-[10px] font-black uppercase opacity-30 tracking-widest">Installed</span>
      <button class="btn btn-xs btn-ghost border-base-300" onclick="window.loadExtensions()">
        <i data-feather="refresh-cw" class="w-3"></i>
      </button>
    </div>
    <div id="extList" class="grid grid-cols-1 md:grid-cols-2 gap-3">
      <div class="text-center py-10 opacity-50"><span class="loading loading-spinner"></span></div>
    </div>
  </div>
</div>
