<div id="sidePanelBackdrop" class="side-panel-backdrop" onclick="window.closeSidePanel()"></div>
<div id="sidePanel">
  <div class="side-panel-header">
    <h3 class="font-black uppercase tracking-widest text-xs flex items-center gap-2" id="sidePanelTitle">
      Title
    </h3>
    <button class="btn btn-sm btn-circle btn-ghost" onclick="window.closeSidePanel()">✕</button>
  </div>
  <div class="side-panel-body" id="sidePanelBody">
    <!-- Content injected here -->
  </div>
  <div class="side-panel-footer" id="sidePanelFooter">
    <!-- Buttons injected here -->
  </div>
</div>

<script>
  window.openSidePanel = function (titleHtml, bodyHtml, footerHtml) {
    document.getElementById('sidePanelTitle').innerHTML = titleHtml;
    document.getElementById('sidePanelBody').innerHTML = bodyHtml;
    document.getElementById('sidePanelFooter').innerHTML = footerHtml || '';

    document.getElementById('sidePanel').classList.add('open');
    document.getElementById('sidePanelBackdrop').classList.add('open');
    if (window.feather) feather.replace();
  };

  window.closeSidePanel = function () {
    document.getElementById('sidePanel').classList.remove('open');
    document.getElementById('sidePanelBackdrop').classList.remove('open');
  };
</script>
