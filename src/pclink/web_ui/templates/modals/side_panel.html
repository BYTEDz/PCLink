<div id="sidePanelBackdrop" class="side-panel-backdrop" onclick="window.closeSidePanel()"></div>
<div id="sidePanel">
  <div class="side-panel-header">
    <h3 class="font-black uppercase tracking-widest text-xs flex items-center gap-2" id="sidePanelTitle">
      Title
    </h3>
    <div class="flex items-center gap-1">
      <button class="btn btn-xs btn-circle btn-ghost" id="sidePanelExpandBtn" onclick="window.toggleSidePanelFullscreen()" title="Toggle Fullscreen">
        <i data-feather="maximize-2" class="w-3 h-3"></i>
      </button>
      <button class="btn btn-xs btn-circle btn-ghost" onclick="window.closeSidePanel()">
        <i data-feather="x" class="w-3 h-3"></i>
      </button>
    </div>
  </div>
  <div class="side-panel-body" id="sidePanelBody">
    <!-- Content injected here -->
  </div>
  <div class="side-panel-footer" id="sidePanelFooter">
    <!-- Buttons injected here -->
  </div>
</div>
