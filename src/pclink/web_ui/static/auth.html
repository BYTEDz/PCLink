<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCLink Authentication</title>
    <script>
      const originalWarn = console.warn;
      console.warn = (...args) => { if (typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com')) return; originalWarn(...args); };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="/ui/static/style.css">
    <link rel="icon" type="image/svg+xml" href="/ui/assets/pclink.svg">
</head>
<body class="bg-base-300 min-h-screen flex items-center justify-center p-4">

    <div class="card w-full max-w-sm bg-base-100 shadow-2xl border border-base-300">
        <div class="card-body items-center text-center p-10 font-bold">
            <div class="bg-primary p-4 rounded-2xl mb-8 shadow-lg">
                <img src="/ui/assets/pclink.svg" width="48" height="48" class="icon-white" alt="PCLink Logo">
            </div>

            <div id="loginForm" class="w-full" style="display: block;">
                <h1 class="text-2xl font-black mb-1">Authentication</h1>
                <p class="text-sm opacity-60 mb-8">Enter your master password to continue</p>

                <form class="space-y-4" onsubmit="handleLogin(event)">
                    <input type="password" id="loginPassword" placeholder="Master Password" class="input input-bordered w-full text-center" required>
                    <button type="submit" class="btn btn-primary w-full text-white font-bold shadow-lg" id="loginButton">Sign In</button>
                </form>
            </div>

            <div id="setupForm" class="w-full" style="display: none;">
                <h1 class="text-2xl font-black mb-1">Welcome to PCLink</h1>
                <p class="text-sm opacity-60 mb-8">Create a master password to secure your server.</p>

                <form class="space-y-3" onsubmit="handleSetup(event)">
                    <input type="password" id="setupPassword" placeholder="Create Password" class="input input-bordered w-full text-center" required>
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" class="input input-bordered w-full text-center" required>
                    <button type="submit" class="btn btn-primary w-full mt-4 font-bold shadow-lg" id="setupButton">Set Password</button>
                </form>
            </div>

            <div id="errorMessage" class="alert alert-error text-xs font-bold mt-6 hidden border-none p-3"></div>
            <div id="successMessage" class="alert alert-success text-xs font-bold mt-6 hidden border-none p-3"></div>
        </div>
    </div>

    <script>
        /* ensure login page matches saved preference */
        const savedTheme = localStorage.getItem('pclink_theme') || 'system';
        if (savedTheme === 'system') {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        } else {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
    </script>
    <script src="/ui/static/auth.js"></script>
</body>
</html>
